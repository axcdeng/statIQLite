        - name: basis
          in: query
          schema:
            type: string
            enum: [mu, conservative, sigma, skills_conservative]
            default: conservative
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
