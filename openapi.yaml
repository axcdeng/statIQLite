openapi: 3.1.0
info:
  title: RoboStem DB API
  version: 2.1.0
  description: |
    Comprehensive API for RoboStemDB.

    Includes:
    - Core event/team/program/season endpoints
    - Division-aware rankings/matches
    - Leaderboards for V5RC and VIQRC by metric
    - Partial endpoints for skills-style responses where source data is aggregate
    - StatiQ leaderboard metrics for V5RC and VIQRC
  license:
    name: ISC
servers:
  - url: https://api.robostem-api.org
    description: Production server
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Health
  - name: Events
  - name: Teams
  - name: Skills
  - name: Rankings
  - name: Programs
  - name: Seasons
  - name: Divisions
  - name: Leaderboards
  - name: Partial

security:
  - ApiKeyAuth: []

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /auth/verify:
    get:
      tags: [Health]
      summary: Verify API key
      responses:
        '200':
          description: API key is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid: { type: boolean }
                  tier: { type: string }
                  owner: { type: string }

  /auth/usage:
    get:
      tags: [Health]
      summary: Get API usage statistics
      responses:
        '200':
          description: Usage statistics
          content:
            application/json:
              schema:
                type: object

  /search:
    get:
      tags: [Events, Teams]
      summary: Regex/fuzzy search across events and teams
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: q
          in: query
          schema: { type: string }
        - name: regex
          in: query
          schema: { type: string }
        - name: season_id
          in: query
          schema: { type: integer }
        - name: program
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
      responses:
        '200':
          description: Combined search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    type: object
                    properties:
                      query: { type: string, nullable: true }
                      regex: { type: string, nullable: true }
                      total: { type: integer }
                  data:
                    type: object
                    properties:
                      events:
                        type: array
                        items: { $ref: '#/components/schemas/Event' }
                      teams:
                        type: array
                        items: { $ref: '#/components/schemas/Team' }

  /events/search:
    get:
      tags: [Events]
      summary: Search events only (fuzzy/regex)
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - name: search
          in: query
          schema: { type: string }
        - name: q
          in: query
          schema: { type: string }
        - name: regex
          in: query
          schema: { type: string }
        - name: season_id
          in: query
          schema: { type: integer }
        - name: program
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Paginated event search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEvent'
        '400':
          description: Missing search input

  /teams/search:
    get:
      tags: [Teams]
      summary: Search teams only (fuzzy/regex)
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - name: search
          in: query
          schema: { type: string }
        - name: q
          in: query
          schema: { type: string }
        - name: regex
          in: query
          schema: { type: string }
        - name: season_id
          in: query
          schema: { type: integer }
        - name: program
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Paginated team search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTeam'
        '400':
          description: Missing search input

  /events:
    get:
      tags: [Events]
      summary: List events
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - name: id[]
          in: query
          schema: { type: array, items: { type: integer } }
          style: form
          explode: true
        - name: sku[]
          in: query
          schema: { type: array, items: { type: string } }
          style: form
          explode: true
        - name: season[]
          in: query
          schema: { type: array, items: { type: integer } }
          style: form
          explode: true
        - name: season_id
          in: query
          schema: { type: integer }
        - name: program
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
        - name: q
          in: query
          schema: { type: string }
        - name: regex
          in: query
          schema: { type: string }
        - name: start
          in: query
          schema: { type: string, format: date-time }
        - name: end
          in: query
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Paginated events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEvent'

  /events/{id}:
    get:
      tags: [Events]
      summary: Get event by ID
      parameters:
        - $ref: '#/components/parameters/EventId'
      responses:
        '200':
          description: Event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'

  /events/{id}/teams:
    get:
      tags: [Events]
      summary: Teams at an event
      parameters:
        - $ref: '#/components/parameters/EventId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated teams
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTeam'

  /events/{id}/awards:
    get:
      tags: [Events]
      summary: Awards at an event
      parameters:
        - $ref: '#/components/parameters/EventId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated awards
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAward'

  /events/{id}/matches:
    get:
      tags: [Events]
      summary: Matches at an event
      parameters:
        - $ref: '#/components/parameters/EventId'
        - name: division
          in: query
          schema: { type: integer }
        - name: round
          in: query
          schema: { type: integer }
        - name: scored
          in: query
          schema: { type: boolean }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated matches
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMatch'

  /events/{id}/divisions:
    get:
      tags: [Divisions]
      summary: Divisions for event
      parameters:
        - $ref: '#/components/parameters/EventId'
      responses:
        '200':
          description: Event divisions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Division'

  /events/{id}/divisions/{div}/matches:
    get:
      tags: [Divisions]
      summary: Division matches
      parameters:
        - $ref: '#/components/parameters/EventId'
        - $ref: '#/components/parameters/DivisionId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated matches
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMatch'

  /events/{id}/divisions/{div}/rankings:
    get:
      tags: [Divisions]
      summary: Division qualification rankings
      parameters:
        - $ref: '#/components/parameters/EventId'
        - $ref: '#/components/parameters/DivisionId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated division rankings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRanking'

  /events/{id}/divisions/{div}/finalist-rankings:
    get:
      tags: [Divisions]
      summary: Division finalist rankings
      parameters:
        - $ref: '#/components/parameters/EventId'
        - $ref: '#/components/parameters/DivisionId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated finalist rankings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRanking'

  /events/{id}/{div}/rankings:
    get:
      tags: [Divisions]
      summary: Legacy alias for division qualification rankings
      parameters:
        - $ref: '#/components/parameters/EventId'
        - $ref: '#/components/parameters/DivisionId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated division rankings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRanking'

  /events/{id}/{div}/finalistRankings:
    get:
      tags: [Divisions]
      summary: Legacy alias for division finalist rankings
      parameters:
        - $ref: '#/components/parameters/EventId'
        - $ref: '#/components/parameters/DivisionId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated finalist rankings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRanking'

  /events/{id}/{div}/matches/{matchId}:
    get:
      tags: [Divisions]
      summary: Get specific match from a division
      parameters:
        - $ref: '#/components/parameters/EventId'
        - $ref: '#/components/parameters/DivisionId'
        - name: matchId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Match
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Match'

  /teams:
    get:
      tags: [Teams]
      summary: List teams
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - name: id[]
          in: query
          schema: { type: array, items: { type: integer } }
          style: form
          explode: true
        - name: number[]
          in: query
          schema: { type: array, items: { type: string } }
          style: form
          explode: true
        - name: season_id
          in: query
          schema: { type: integer }
        - name: program
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
        - name: q
          in: query
          schema: { type: string }
        - name: regex
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Paginated teams
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTeam'

  /teams/{id}:
    get:
      tags: [Teams]
      summary: Get team by ID
      parameters:
        - $ref: '#/components/parameters/TeamId'
      responses:
        '200':
          description: Team
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'

  /teams/{id}/stats:
    get:
      tags: [Teams]
      summary: Team stats summary and ranking history
      parameters:
        - $ref: '#/components/parameters/TeamId'
        - name: season_id
          in: query
          schema: { type: integer }
        - name: season
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Team stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamStatsResponse'
        '404':
          description: Team not found

  /teams/{id}/events:
    get:
      tags: [Teams]
      summary: Events for team
      parameters:
        - $ref: '#/components/parameters/TeamId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEvent'

  /teams/{id}/matches:
    get:
      tags: [Teams]
      summary: Matches for team
      parameters:
        - $ref: '#/components/parameters/TeamId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated matches
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMatch'

  /teams/{id}/rankings:
    get:
      tags: [Teams, Partial]
      summary: Rankings for team (partial parity)
      description: Derived from local event/division ranking data.
      x-implementation-status: partial
      parameters:
        - $ref: '#/components/parameters/TeamId'
        - name: scope
          in: query
          schema:
            type: string
            enum: [qualification, finalist, all]
            default: all
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated rankings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRanking'

  /teams/{id}/awards:
    get:
      tags: [Teams]
      summary: Awards for team
      parameters:
        - $ref: '#/components/parameters/TeamId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated awards
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAward'

  /teams/{id}/skills:
    get:
      tags: [Teams, Partial]
      summary: Team skills (partial)
      description: Aggregate skills from event/team and world snapshots; not full per-attempt canonical history.
      x-implementation-status: partial
      parameters:
        - $ref: '#/components/parameters/TeamId'
        - name: source
          in: query
          schema:
            type: string
            enum: [event, world, all]
            default: all
        - name: type[]
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
              enum: [driver, programming, combined]
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated skill aggregates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSkillAggregate'

  /matches:
    get:
      tags: [Divisions]
      summary: List matches
      parameters:
        - name: event
          in: query
          schema: { type: integer }
        - name: team
          in: query
          schema: { type: integer }
        - name: division
          in: query
          schema: { type: integer }
        - name: round
          in: query
          schema: { type: integer }
        - name: scored
          in: query
          schema: { type: boolean }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated matches
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMatch'

  /matches/{id}:
    get:
      tags: [Divisions]
      summary: Get match by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Match
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Match'

  /awards:
    get:
      tags: [Events]
      summary: List awards
      parameters:
        - name: event
          in: query
          schema: { type: integer }
        - name: team
          in: query
          schema: { type: integer }
        - name: title
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated awards
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAward'

  /events/{id}/skills:
    get:
      tags: [Events, Partial]
      summary: Event skills (partial)
      description: Aggregate skills response; not full canonical run-level dataset.
      x-implementation-status: partial
      parameters:
        - $ref: '#/components/parameters/EventId'
        - name: type[]
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
              enum: [driver, programming, combined]
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated skill aggregates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSkillAggregate'

  /skills/global:
    get:
      tags: [Skills]
      summary: Global skills leaderboard
      parameters:
        - name: program
          in: query
          required: true
          schema: { type: string }
        - name: country
          in: query
          schema: { type: string }
        - name: region
          in: query
          schema: { type: string }
        - name: team
          in: query
          schema: { type: string }
        - name: season
          in: query
          schema: { type: integer }
        - name: grade
          in: query
          required: true
          schema:
            type: string
            enum: [elementary, middle, high, all, es, ms, hs]
        - name: min_score
          in: query
          schema: { type: integer }
        - name: max_score
          in: query
          schema: { type: integer }
        - name: min_rank
          in: query
          schema: { type: integer }
        - name: max_rank
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer }
        - name: skip
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Paginated global skills
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSkillAggregate'

  /rankings/skills/world:
    get:
      tags: [Skills]
      summary: World Skills Rankings
      parameters:
        - name: grade
          in: query
          required: true
          schema:
            type: string
            enum: [elementary, middle, high, all, es, ms, hs]
        - name: program
          in: query
          required: true
          schema:
            type: string
            enum: [VIQRC, V5RC]
        - name: season
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer }
        - name: skip
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: World skills rankings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSkillAggregate'

  /rankings/skills/world/elementary:
    get:
      tags: [Skills]
      summary: VIQRC Elementary School World Skills
      parameters:
        - name: program
          in: query
          required: true
          schema:
            type: string
            enum: [VIQRC]
      responses:
        '200':
          description: Elementary world skills
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSkillAggregate'

  /rankings/skills/world/middle:
    get:
      tags: [Skills]
      summary: VIQRC Middle School World Skills
      parameters:
        - name: program
          in: query
          required: true
          schema:
            type: string
            enum: [VIQRC, V5RC]
      responses:
        '200':
          description: Middle school world skills
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSkillAggregate'

  /rankings/skills/world/team/{id}:
    get:
      tags: [Skills]
      summary: Team's World Skills Ranking
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: season
          in: query
          schema: { type: integer }
        - name: program
          in: query
          required: true
          schema:
            type: string
            enum: [VIQRC, V5RC]
        - name: grade
          in: query
          required: true
          schema:
            type: string
            enum: [elementary, middle, high, all, es, ms, hs]
      responses:
        '200':
          description: Team world skills
          content:
            application/json:
              schema:
                type: object

  /rankings/statiq:
    get:
      tags: [Rankings]
      summary: Global StatiQ Leaderboard
      parameters:
        - name: season
          in: query
          schema: { type: integer }
        - name: program
          in: query
          schema: { type: string }
        - name: region
          in: query
          schema: { type: string }
        - name: country
          in: query
          schema: { type: string }
        - name: sort
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer }
        - name: skip
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: StatiQ leaderboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLeaderboardRow'

  /rankings/statiq/epa:
    get:
      tags: [Rankings]
      summary: Global EPA Leaderboard
      responses:
        '200':
          description: EPA leaderboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLeaderboardRow'

  /rankings/statiq/skills:
    get:
      tags: [Rankings]
      summary: StatiQ Skills Leaderboard
      parameters:
        - name: season
          in: query
          schema: { type: integer }
        - name: program
          in: query
          schema: { type: string }
        - name: type
          in: query
          schema:
            type: string
            enum: [driver, programming, combined]
      responses:
        '200':
          description: Skills leaderboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLeaderboardRow'

  /rankings/statiq/team/{id}:
    get:
      tags: [Rankings]
      summary: Get team's StatiQ ranking
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: season
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Team statiq ranking
          content:
            application/json:
              schema:
                type: object

  /rankings/trueskill/{sku}:
    get:
      tags: [Rankings]
      summary: Get TrueSkill leaderboard for event
      parameters:
        - name: sku
          in: path
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer }
        - name: skip
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Event TrueSkill leaderboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLeaderboardRow'

  /rankings/trueskill/pure:
    get:
      tags: [Rankings]
      summary: Get pure TrueSkill rankings
      description: |
        Returns global TrueSkill leaderboard rows.

        Backward-compatibility note:
        The query parameters below are documented as **fake compatibility parameters** to
        match legacy Swagger clients. They are accepted for compatibility and may be ignored
        by newer clients.
      parameters:
        - name: season
          in: query
          deprecated: true
          schema: { type: integer }
          description: '[Fake/compat-only] Legacy season filter parameter.'
          x-compatibility-only: true
        - name: program
          in: query
          deprecated: true
          schema: { type: string }
          description: '[Fake/compat-only] Legacy program filter parameter.'
          x-compatibility-only: true
        - name: region
          in: query
          deprecated: true
