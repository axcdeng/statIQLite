        Access is restricted to API keys with tier `unlimited`.
      parameters:
        - name: season
          in: query
          schema: { type: integer }
          description: Optional season ID filter.
        - name: season_id
          in: query
          schema: { type: integer }
          description: Alias for `season`.
        - name: format
          in: query
          schema:
            type: string
            enum: [csv, json]
            default: csv
          description: Download format.
      responses:
        '200':
          description: Export file
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
                  season_id:
                    type: integer
                    nullable: true
