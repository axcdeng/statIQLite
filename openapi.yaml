            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        $ref: '#/components/schemas/LeaderboardRow'

  /leaderboards/v5/rank:
    get:
      tags: [Leaderboards]
      summary: V5 leaderboard by database rank column (exact)
      parameters:
        - name: season_id
          in: query
          schema: { type: integer }
        - name: rank
          in: query
          schema: { type: integer, minimum: 1 }
        - name: rank_min
          in: query
          schema: { type: integer, minimum: 1 }
        - name: rank_max
          in: query
          schema: { type: integer, minimum: 1 }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated leaderboard rows ordered by stored DB rank
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLeaderboardRow'

  /leaderboards/viqrc/rank:
    get:
      tags: [Leaderboards]
      summary: VIQRC leaderboard by database rank column (exact)
      parameters:
        - name: season_id
          in: query
          schema: { type: integer }
        - name: rank
          in: query
          schema: { type: integer, minimum: 1 }
        - name: rank_min
          in: query
          schema: { type: integer, minimum: 1 }
        - name: rank_max
          in: query
          schema: { type: integer, minimum: 1 }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated leaderboard rows ordered by stored DB rank
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLeaderboardRow'

  /leaderboards/viqrc/all:
    get:
      tags: [Leaderboards]
      summary: VIQRC all-metric leaderboards
      parameters:
        - name: season_id
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Leaderboards by metric
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        $ref: '#/components/schemas/LeaderboardRow'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  parameters:
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    PerPage:
      name: per_page
      in: query
      schema: { type: integer, minimum: 1, maximum: 250, default: 25 }
    EventId:
      name: id
      in: path
      required: true
      schema: { type: integer }
    TeamId:
      name: id
      in: path
      required: true
      schema: { type: integer }
    DivisionId:
      name: div
      in: path
      required: true
      schema: { type: integer }

  schemas:
    PageMeta:
      type: object
      properties:
        tier:
          type: string
          enum: [regular, unlimited]
        page: { type: integer }
        per_page: { type: integer }
        count: { type: integer }
        limit: { type: integer }
        skip: { type: integer }
        total: { type: integer }

    Event:
      type: object
      properties:
        id: { type: integer }
        sku: { type: string }
        name: { type: string }
        program: { type: string }
        season_id: { type: integer }
        event_type: { type: string, nullable: true }
        timezone: { type: string, nullable: true }
        venue: { type: string, nullable: true }
        city: { type: string, nullable: true }
        region: { type: string, nullable: true }
        country: { type: string, nullable: true }
        postal_code: { type: string, nullable: true }
        start: { type: string, format: date-time }
        end: { type: string, format: date-time }
        is_league_finals: { type: boolean, nullable: true }
        has_skills: { type: boolean, nullable: true }
        match_count_expected: { type: integer, nullable: true }
        teams_count: { type: integer, nullable: true }
        matches_count: { type: integer, nullable: true }
        scored_matches_count: { type: integer, nullable: true }
        awards_count: { type: integer, nullable: true }
        skills_teams_count: { type: integer, nullable: true }
        divisions_count: { type: integer, nullable: true }

    Team:
      type: object
      properties:
        id: { type: integer }
        number: { type: string }
        team_name: { type: string }
        organization: { type: string }
        program: { type: string }
        city: { type: string, nullable: true }
        region: { type: string }
        country: { type: string }
        statiq:
          type: object
          properties:
            statiq_score: { type: number, nullable: true }
            trueskill_mu: { type: number, nullable: true }
            trueskill_sigma: { type: number, nullable: true }
            trueskill_conservative: { type: number, nullable: true }
            auto_skill: { type: number, nullable: true }
            epa_total: { type: number, nullable: true }
            epa_auto: { type: number, nullable: true }
            epa_driver: { type: number, nullable: true }
            offense: { type: number, nullable: true }
            defense: { type: number, nullable: true }
            ccwm: { type: number, nullable: true }
            signature_wins: { type: number, nullable: true }
            total_matches: { type: number, nullable: true }
            ts_mu: { type: number, nullable: true }
            ts_sigma: { type: number, nullable: true }
            ts_mu_dr: { type: number, nullable: true }
            ts_sigma_dr: { type: number, nullable: true }
            ts_mu_pr: { type: number, nullable: true }
            ts_sigma_pr: { type: number, nullable: true }
            ts_conservative: { type: number, nullable: true }
            ts_conservative_sk: { type: number, nullable: true }
            epa: { type: number, nullable: true }
            opr: { type: number, nullable: true }
            avg_score: { type: number, nullable: true }
            max_score: { type: number, nullable: true }
            sig_wins: { type: number, nullable: true }
            match_count: { type: number, nullable: true }
            alliance_luck: { type: number, nullable: true }
            variance_penalty: { type: number, nullable: true }
            reliability_factor: { type: number, nullable: true }

    Award:
      type: object
      properties:
        id: { type: integer }
        event_id: { type: integer }
        team_id: { type: integer }
        award_name: { type: string }

    Match:
      type: object
      properties:
        id: { type: integer }
        event_id: { type: integer }
        division_id: { type: integer }
        round: { type: string }
        instance: { type: integer }
        matchnum: { type: integer }
        red_score: { type: integer }
        blue_score: { type: integer }

    Ranking:
      type: object
      properties:
        event_id: { type: integer }
        division_id: { type: integer }
        team_id: { type: integer }
        ranking_scope: { type: string }
        rank: { type: integer }
        wins: { type: integer }
        losses: { type: integer }
        ties: { type: integer }
        wp: { type: integer }
        ap: { type: integer }
        sp: { type: integer }
        opr: { type: number }
        dpr: { type: number }
        ccwm: { type: number }

    Division:
      type: object
      properties:
        event_id: { type: integer }
        division_id: { type: integer }
        division_name: { type: string }
        is_primary: { type: boolean }

    Program:
      type: object
      properties:
        id: { type: integer }
        code: { type: string }
        name: { type: string }

    Season:
      type: object
      properties:
        id: { type: integer }
        code: { type: string }
        name: { type: string }
        year_start: { type: integer }
        year_end: { type: integer }
        program: { type: string }

    LeaderboardRow:
      type: object
      properties:
        rank: { type: integer }
        team_id: { type: integer }
        team_number: { type: string }
        team_name: { type: string }
        value: { type: number }
        season_id: { type: integer }
        metric: { type: string }
        statiq_score: { type: number, nullable: true }
        trueskill_mu: { type: number, nullable: true }
        trueskill_sigma: { type: number, nullable: true }
        trueskill_conservative: { type: number, nullable: true }
        auto_skill: { type: number, nullable: true }
        epa_total: { type: number, nullable: true }
        epa_auto: { type: number, nullable: true }
        epa_driver: { type: number, nullable: true }
        offense: { type: number, nullable: true }
        defense: { type: number, nullable: true }
        ccwm: { type: number, nullable: true }
        signature_wins: { type: number, nullable: true }
        total_matches: { type: number, nullable: true }
        ts_mu: { type: number, nullable: true }
        ts_sigma: { type: number, nullable: true }
        ts_mu_dr: { type: number, nullable: true }
        ts_sigma_dr: { type: number, nullable: true }
        ts_mu_pr: { type: number, nullable: true }
        ts_sigma_pr: { type: number, nullable: true }
        ts_conservative: { type: number, nullable: true }
        ts_conservative_sk: { type: number, nullable: true }
        epa: { type: number, nullable: true }
        opr: { type: number, nullable: true }
        avg_score: { type: number, nullable: true }
        max_score: { type: number, nullable: true }
        sig_wins: { type: number, nullable: true }
        match_count: { type: number, nullable: true }
        alliance_luck: { type: number, nullable: true }
        variance_penalty: { type: number, nullable: true }
        reliability_factor: { type: number, nullable: true }

    SkillAggregate:
      type: object
      properties:
        team_id: { type: integer }
        team_number: { type: string }
        event_id: { type: integer, nullable: true }
        season_id: { type: integer, nullable: true }
        driver_score: { type: number, nullable: true }
        programming_score: { type: number, nullable: true }
        combined_score: { type: number, nullable: true }
        source:
          type: string
          enum: [event, world]

    TeamStatsResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            team:
              $ref: '#/components/schemas/Team'
            rankings:
              type: object
              properties:
                v5rc:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                viqrc:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
            skills:
              type: object
              properties:
                best_driver: { type: number, nullable: true }
                best_programming: { type: number, nullable: true }
                best_combined: { type: number, nullable: true }
                records: { type: integer }
            filters:
              type: object
              properties:
                season_id: { type: integer, nullable: true }

    PaginatedEvent:
      type: object
      properties:
        count: { type: integer }
        limit: { type: integer }
        skip: { type: integer }
        total: { type: integer }
        meta: { $ref: '#/components/schemas/PageMeta' }
        data:
          type: array
          items: { $ref: '#/components/schemas/Event' }

    PaginatedTeam:
      type: object
      properties:
        count: { type: integer }
        limit: { type: integer }
        skip: { type: integer }
        total: { type: integer }
        meta: { $ref: '#/components/schemas/PageMeta' }
        data:
          type: array
          items: { $ref: '#/components/schemas/Team' }

    PaginatedAward:
      type: object
      properties:
        count: { type: integer }
        limit: { type: integer }
        skip: { type: integer }
        total: { type: integer }
        meta: { $ref: '#/components/schemas/PageMeta' }
        data:
          type: array
          items: { $ref: '#/components/schemas/Award' }

    PaginatedMatch:
      type: object
      properties:
        count: { type: integer }
        limit: { type: integer }
        skip: { type: integer }
        total: { type: integer }
        meta: { $ref: '#/components/schemas/PageMeta' }
        data:
          type: array
          items: { $ref: '#/components/schemas/Match' }

    PaginatedRanking:
      type: object
      properties:
        count: { type: integer }
        limit: { type: integer }
        skip: { type: integer }
        total: { type: integer }
        meta: { $ref: '#/components/schemas/PageMeta' }
        data:
          type: array
          items: { $ref: '#/components/schemas/Ranking' }

    PaginatedLeaderboardRow:
      type: object
      properties:
        count: { type: integer }
        limit: { type: integer }
        skip: { type: integer }
        total: { type: integer }
        meta: { $ref: '#/components/schemas/PageMeta' }
        data:
          type: array
          items: { $ref: '#/components/schemas/LeaderboardRow' }

    PaginatedProgram:
      type: object
      properties:
        count: { type: integer }
        limit: { type: integer }
        skip: { type: integer }
        total: { type: integer }
        meta: { $ref: '#/components/schemas/PageMeta' }
        data:
          type: array
          items: { $ref: '#/components/schemas/Program' }

    PaginatedSeason:
      type: object
      properties:
        count: { type: integer }
        limit: { type: integer }
        skip: { type: integer }
        total: { type: integer }
        meta: { $ref: '#/components/schemas/PageMeta' }
        data:
          type: array
          items: { $ref: '#/components/schemas/Season' }

    PaginatedSkillAggregate:
      type: object
      properties:
        count: { type: integer }
        limit: { type: integer }
        skip: { type: integer }
        total: { type: integer }
        meta:
          allOf:
            - $ref: '#/components/schemas/PageMeta'
            - type: object
              properties:
                implementation_status:
                  type: string
                  enum: [partial]
                coverage_notes:
                  type: string
        data:
          type: array
          items: { $ref: '#/components/schemas/SkillAggregate' }
